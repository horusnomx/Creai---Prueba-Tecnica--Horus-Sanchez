[pytest]
addopts = --browser chromium -ra --tb=short --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: critical path — go/no-go del build
    functional: user flows and navigation
    regression: technical contracts, SEO, responsive
    mobile: any test using mobile or tablet viewport
